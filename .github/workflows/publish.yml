name: Publish NuGet package

# Каждый push в master публикует новую версию в NuGet (nuget.org).
# Версия = MAJOR_MINOR.<номер запуска workflow> — patch авто-инкрементится.
# Чтобы поднять мажор/минор, измените MAJOR_MINOR ниже.
# Требуется секрет репозитория NUGET_API_KEY (API-ключ nuget.org с правом Push).
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  MAJOR_MINOR: '1.0'

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute version
        id: ver
        shell: bash
        run: echo "version=${MAJOR_MINOR}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack WordDocumentHelpers/WordDocumentHelpers.csproj -c Release -p:Version=${{ steps.ver.outputs.version }} -o artifacts

      - name: Push to NuGet.org
        shell: bash
        run: >
          dotnet nuget push artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate

      - name: Summary
        shell: bash
        run: echo "Published WordDocumentHelpers ${{ steps.ver.outputs.version }} to nuget.org" >> "$GITHUB_STEP_SUMMARY"
